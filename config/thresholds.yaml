# Android Trust Anchor - Scoring Thresholds Configuration

# Overall thresholds
overall:
  pass_threshold: 0.70      # 70% required to pass
  trusted_threshold: 0.80   # 80%+ for TRUSTED level

# Category-specific thresholds and weights
categories:
  boot:
    pass_threshold: 0.80    # Boot security is critical
    weight: 2.0
  integrity:
    pass_threshold: 0.70
    weight: 2.0
  hardware:
    pass_threshold: 0.70
    weight: 1.5
  encryption:
    pass_threshold: 0.70
    weight: 1.5
  authentication:
    pass_threshold: 0.60
    weight: 1.0
  software:
    pass_threshold: 0.60
    weight: 1.0
  network:
    pass_threshold: 0.50
    weight: 0.5

# Critical checks (must pass for overall pass)
critical_checks:
  - bootloader_lock
  - verified_boot
  - selinux_enforcing
  - device_encryption
  - screen_lock
  - root_detection
  - emulator_detection

# Check-specific weights (overrides category defaults)
check_weights:
  root_detection: 2.0
  verified_boot: 2.0
  dm_verity: 1.5
  selinux_enforcing: 1.5
  device_encryption: 1.5
  bootloader_lock: 2.0
  security_patch: 1.0
  gms_certification: 1.0
  key_attestation: 1.0

# Scoring curves for specific checks
scoring:
  security_patch:
    full_score_months: 1      # Full score if patched within 1 month
    half_score_months: 3       # Half score if patched within 3 months
    zero_score_months: 12      # Zero score if older than 12 months

  device_encryption:
    full_score: "fbe"          # Full-disk encryption
    half_score: "fde"          # Full-disk encryption
    zero_score: "none"         # No encryption

# Trust level labels
trust_levels:
  trusted: 0.80      # 80-100: Fully trusted
  acceptable: 0.60   # 60-79: Generally acceptable
  caution: 0.40      # 40-59: Proceed with care
  high_risk: 0.20   # 20-39: Significant concerns
  untrusted: 0.00   # 0-19: Do not trust
